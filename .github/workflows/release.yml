name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.goos }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            runner: windows-latest
            platform: windows
            ext: .exe
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            platform: macos
            ext: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure git for private Go modules
        shell: bash
        env:
          DDAN_READ_TOKEN: ${{ secrets.DDAN_READ_TOKEN }}
        run: |
          if [[ -z "${DDAN_READ_TOKEN}" ]]; then
            echo "DDAN_READ_TOKEN secret is not set"
            exit 1
          fi
          git config --global url."https://x-access-token:${DDAN_READ_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Determine version
        id: ver
        shell: bash
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOPRIVATE: github.com/mpkondrashin/ddan
          GONOSUMDB: github.com/mpkondrashin/ddan
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        shell: bash
        run: |
          mkdir -p dist
          go env
          go build -v -o "dist/submissions${{ matrix.ext }}" .

      - name: Package (windows)
        if: ${{ matrix.platform == 'windows' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist_pkg | Out-Null
          $zipName = "submissions_${{ matrix.platform }}_${{ steps.ver.outputs.version }}.zip"
          Copy-Item opengl32.dll dist/ -Force
          Compress-Archive -Path dist/* -DestinationPath ("dist_pkg/" + $zipName) -Force

      - name: Package (zip)
        if: ${{ matrix.platform != 'windows' }}
        shell: bash
        run: |
          mkdir -p dist_pkg
          ZIP_NAME="submissions_${{ matrix.platform }}_${{ steps.ver.outputs.version }}.zip"
          (cd dist && zip -r "../dist_pkg/${ZIP_NAME}" .)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: submissions_${{ matrix.platform }}_${{ steps.ver.outputs.version }}
          path: dist_pkg/submissions_${{ matrix.platform }}_${{ steps.ver.outputs.version }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/submissions_*.zip
